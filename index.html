<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0f0f0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>LLMPlayground</title>
  <link rel="stylesheet" href="css/coding-editor.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0f0f0f;
      --bg2: #1a1a1a;
      --bg3: #242424;
      --border: #333;
      --text: #e0e0e0;
      --text2: #999;
      --accent: #7c6af7;
      --accent2: #5b4fcf;
      --green: #4caf50;
      --red: #f44336;
      --yellow: #ff9800;
      --code-bg: #141414;
      --nav-height: 56px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    html { height: 100%; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-text-size-adjust: 100%;
    }

    #nav {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      height: var(--nav-height);
      gap: 4px;
      flex-shrink: 0;
      position: relative;
      z-index: 100;
    }
    #nav .logo {
      font-weight: 700;
      font-size: 17px;
      color: var(--accent);
      text-decoration: none;
      white-space: nowrap;
      margin-right: 8px;
    }
    .nav-links {
      display: none;
      position: fixed;
      top: var(--nav-height);
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg2);
      flex-direction: column;
      padding: 8px 0;
      z-index: 99;
      overflow-y: auto;
    }
    .nav-links.open { display: flex; }
    .nav-links a {
      color: var(--text2);
      text-decoration: none;
      padding: 14px 20px;
      font-size: 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s, color 0.15s;
    }
    .nav-links a:hover, .nav-links a:active { background: var(--bg3); color: var(--text); }
    .nav-links a.active { color: var(--accent); background: var(--bg3); }
    #nav .spacer { flex: 1; }
    #nav .provider-badge {
      font-size: 11px;
      color: var(--text2);
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 140px;
    }
    #nav .provider-badge:hover { border-color: var(--accent); color: var(--accent); }
    .hamburger {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 40px;
      height: 40px;
      padding: 8px;
      cursor: pointer;
      border: none;
      background: none;
      border-radius: 6px;
    }
    .hamburger:active { background: var(--bg3); }
    .hamburger span {
      display: block;
      width: 100%;
      height: 2px;
      background: var(--text);
      border-radius: 1px;
      transition: transform 0.2s, opacity 0.2s;
    }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

    #app { flex: 1; overflow: hidden; display: flex; flex-direction: column; }
    #app-content { flex: 1; overflow: hidden; }
    .page { display: none; height: 100%; overflow: hidden; }
    .page.active { display: flex; flex-direction: column; }

    .toast-container {
      position: fixed;
      bottom: calc(12px + var(--safe-bottom));
      left: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      z-index: 9999;
      pointer-events: none;
    }
    .toast {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      animation: slideUp 0.25s ease;
      pointer-events: auto;
    }
    .toast.success { border-color: var(--green); color: var(--green); }
    .toast.error { border-color: var(--red); color: var(--red); }
    .toast.info { border-color: var(--accent); color: var(--accent); }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    input, textarea, select {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      font-size: 16px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      -webkit-appearance: none;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    input::placeholder, textarea::placeholder { color: var(--text2); }
    select option { background: var(--bg3); }

    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .btn { padding: 10px 16px; font-size: 14px; border-radius: 8px; border: none; cursor: pointer; min-height: 44px; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover { background: var(--accent2); }
    .btn-primary:active { background: var(--accent2); transform: scale(0.97); }
    .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn-secondary:active { transform: scale(0.97); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid var(--red); }
    .btn-danger:hover { background: var(--red); color: #fff; }
    .btn-sm { padding: 6px 12px; font-size: 13px; min-height: 36px; }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; justify-content: center; z-index: 1000; }
    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      padding: 20px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: slideModalUp 0.25s ease;
    }
    @keyframes slideModalUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal h2 { font-size: 17px; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 13px; color: var(--text2); margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px 12px; }
    .form-group textarea { resize: vertical; min-height: 80px; }

    @media (min-width: 768px) {
      :root { --nav-height: 48px; }
      body { font-size: 14px; }
      #nav { padding: 0 16px; gap: 4px; }
      #nav .provider-badge { max-width: 280px; }
      .hamburger { display: none; }
      .nav-links {
        display: flex;
        position: static;
        flex-direction: row;
        background: none;
        padding: 0;
        gap: 2px;
        overflow: visible;
      }
      .nav-links a {
        padding: 6px 12px;
        font-size: 13px;
        border-bottom: none;
        border-radius: 6px;
        white-space: nowrap;
      }
      .toast-container { left: auto; right: 20px; bottom: 20px; max-width: 360px; }
      .toast { border-radius: 8px; font-size: 13px; }
      .btn { min-height: auto; padding: 7px 14px; font-size: 13px; border-radius: 6px; }
      .btn-sm { padding: 4px 10px; font-size: 12px; min-height: auto; }
      input, textarea, select { font-size: 13px; border-radius: 6px; }
      .form-group input, .form-group textarea, .form-group select { padding: 8px 10px; }
      .modal-overlay { align-items: center; }
      .modal {
        border-radius: 12px;
        padding: 24px;
        min-width: 360px;
        max-width: 560px;
        width: 90%;
        animation: none;
      }
    }
    #nav .translate-btn { font-size: 11px; color: var(--text2); background: var(--bg3); border: 1px solid var(--border); border-radius: 4px; padding: 3px 8px; cursor: pointer; }
    #nav .translate-btn:hover { border-color: var(--accent); color: var(--accent); }
    #nav .translate-btn:disabled { opacity: 0.5; cursor: default; }
  </style>
</head>
<body>
  <nav id="nav">
    <button class="hamburger" id="hamburger-btn" aria-label="Menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
    <a href="#/" class="logo notranslate">LLMPlayground</a>
    <div class="nav-links" id="nav-links">
      <a href="#/chat" data-route="/chat">Chat</a>
      <a href="#/roleplay" data-route="/roleplay">Roleplay</a>
      <a href="#/coding" data-route="/coding">Coding</a>
      <a href="#/personas" data-route="/personas">Personas</a>
      <a href="#/providers" data-route="/providers">Providers</a>
    </div>
    <div class="spacer"></div>
    <a class="translate-btn" id="btn-translate" onclick="btnTranslate(this); return false;" title="Translate">🌐</a>
    <span class="provider-badge notranslate" id="active-provider-badge" onclick="window.location.hash='#/providers'">Loading...</span>
  </nav>
  <div id="app">
    <div id="app-content">
      <div class="page" id="page-home"></div>
      <div class="page" id="page-chat"></div>
      <div class="page" id="page-roleplay"></div>
      <div class="page" id="page-coding"></div>
      <div class="page" id="page-personas"></div>
      <div class="page" id="page-providers"></div>
    </div>
  </div>
  <div class="toast-container" id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.min.js"></script>
  <script src="https://g4f.dev/dist/js/sanitize-html.js" async></script>
  <script>
    window.MonacoReady = new Promise(function(resolve) {
      require.config({ paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs' } });
      require(['vs/editor/editor.main'], function() {
        monaco.editor.defineTheme('llmplayground', {
          base: 'vs-dark',
          inherit: true,
          rules: [],
          colors: {
            'editor.background': '#141414',
            'editor.foreground': '#e0e0e0',
            'editorLineNumber.foreground': '#555',
            'editorCursor.foreground': '#7c6af7',
            'editor.selectionBackground': '#3a3560',
            'editor.lineHighlightBackground': '#1a1a2e'
          }
        });
        resolve();
      });
    });
  </script>
  <script src="js/store.js"></script>
  <script src="js/api.js"></script>
  <script src="js/translations.js"></script>
  <script src="js/components.js"></script>
  <script src="js/editor-panel.js"></script>
  <script src="js/pages/chat.js"></script>
  <script src="js/pages/roleplay.js"></script>
  <script src="js/pages/coding.js"></script>
  <script src="js/pages/personas.js"></script>
  <script src="js/pages/providers.js"></script>
  <script src="js/router.js"></script>
</body>
</html>
